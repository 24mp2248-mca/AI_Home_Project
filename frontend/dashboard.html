<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard | AI Home Planner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(217, 70, 239, 0.1), transparent 50%);
            filter: blur(80px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            color: var(--primary);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
        }

        .btn-outline:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-main);
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .project-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .project-card:hover {
            transform: translateY(-6px);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 20px rgba(139, 92, 246, 0.1);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-thumbnail {
            width: 100%;
            height: 160px;
            border-radius: 12px;
            margin-bottom: 20px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.05));
            border: 1px dashed rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .project-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .project-card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .project-meta {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-actions {
            display: flex;
            gap: 12px;
        }

        .card-actions .btn {
            flex: 1;
            justify-content: center;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            background: var(--glass-bg);
            border: 1px dashed var(--glass-border);
            border-radius: 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            color: var(--primary);
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="bg-gradient"></div>

    <div class="container">
        <header>
            <a href="index.html" class="logo">
                <i data-lucide="hexagon"></i>
                AI Planner Dashboard
            </a>
            <nav>
                <a href="upload.html" class="btn btn-primary">
                    <i data-lucide="plus"></i> New Project
                </a>
                <button onclick="logout()" class="btn btn-outline">Logout</button>
            </nav>
        </header>

        <section class="hero">
            <h1 id="welcome-msg">Your Spatial Portfolio</h1>
            <p>Manage, review, and iterate on your AI generated architectures.</p>
        </section>

        <div class="dashboard-grid" id="project-list">
            <!-- Projects injected here -->
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        lucide.createIcons();
        const API_URL = CONFIG.API_URL;
        window.loadedProjects = [];

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        async function loadDashboard() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                // Get User Info
                const userRes = await fetch(`${API_URL}/users/me/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!userRes.ok) throw new Error('Auth failed');
                const user = await userRes.json();
                document.getElementById('welcome-msg').innerText = `Welcome back, ${user.username}`;

                // Get Projects
                const projRes = await fetch(`${API_URL}/projects/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const projects = await projRes.json();
                window.loadedProjects = projects;

                const list = document.getElementById('project-list');

                if (projects.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <i data-lucide="folder-open"></i>
                            <h3>No projects found</h3>
                            <p style="margin-top: 8px;">Start by uploading a floor plan sketch.</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                list.innerHTML = '';
                projects.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    card.innerHTML = `
                        <div class="project-thumbnail">
                            <i data-lucide="image" style="width: 32px; height: 32px; opacity: 0.5;"></i>
                        </div>
                        <h3>${p.name}</h3>
                        <div class="project-meta">
                            <i data-lucide="clock" style="width:14px;height:14px;"></i>
                            ID: ${p.id}
                        </div>
                        <div class="card-actions">
                            <button type="button" class="btn btn-outline open-3d-btn" data-id="${p.id}">
                                <i data-lucide="box"></i> Open 3D
                            </button>
                        </div>
                    `;
                    list.appendChild(card);
                });
                lucide.createIcons();

            } catch (err) {
                console.error(err);
                logout();
            }
        }

        async function loadProject(id) {
            console.log(`[Dashboard] Attempting to load project ${id}...`);

            try {
                const project = window.loadedProjects.find(p => String(p.id) === String(id));

                if (!project) {
                    console.error("[Dashboard] Project ID not found in returned list:", id);
                    alert("Project not found!");
                    return;
                }

                console.log(`[Dashboard] Found Project Data for ID ${id}:`, project);

                let layoutData = project.data;
                console.log(`[Dashboard] Raw project.data type:`, typeof layoutData);

                if (typeof layoutData === 'string') {
                    try {
                        console.log(`[Dashboard] project.data is string, parsing JSON...`);
                        // Some endpoints might double stringify or escape quotes.
                        layoutData = layoutData.replace(/\\"/g, '"');
                        if (layoutData.startsWith('"') && layoutData.endsWith('"')) {
                            layoutData = layoutData.substring(1, layoutData.length - 1);
                        }
                        layoutData = JSON.parse(layoutData);
                        console.log(`[Dashboard] First parse result type:`, typeof layoutData);

                        // Handle double stringification
                        if (typeof layoutData === 'string') {
                            layoutData = JSON.parse(layoutData);
                            console.log(`[Dashboard] Second parse result type:`, typeof layoutData);
                        }
                    } catch (e) {
                        console.error("[Dashboard] Fatal error parsing project data:", e);
                        alert("Project data is corrupted and cannot be parsed.");
                        return;
                    }
                }

                if (!layoutData) {
                    console.warn("[Dashboard] Project data is empty or null.");
                    layoutData = {};
                }

                console.log(`[Dashboard] Final Parsed Layout Data:`, layoutData);

                if (layoutData.rooms) {
                    console.log(`[Dashboard] Saving ${layoutData.rooms.length} rooms to localStorage.`);
                    localStorage.setItem('roomData', JSON.stringify(layoutData.rooms));
                } else {
                    console.warn(`[Dashboard] No 'rooms' array found in layoutData! Setting empty array.`);
                    localStorage.setItem('roomData', '[]');
                }

                const projInfo = {
                    filename: project.name || `Project_${id}`,
                    timestamp: layoutData.timestamp || new Date().toISOString(),
                    processed_image_url: layoutData.processed_image_url || '',
                    total_area: layoutData.total_area || 0,
                    estimated_cost: layoutData.estimated_cost || 0,
                    room_count: layoutData.rooms ? layoutData.rooms.length : 0
                };
                console.log(`[Dashboard] Saving projectInfo to localStorage:`, projInfo);
                localStorage.setItem('projectInfo', JSON.stringify(projInfo));
                // Clear sessionStorage to ensure visualization pulls from localStorage
                sessionStorage.removeItem('roomData');
                sessionStorage.removeItem('projectInfo');

                console.log("[Dashboard] Redirecting to visualization.html now.");
                setTimeout(() => {
                    window.location.href = 'visualization.html?t=' + Date.now();
                }, 100);

            } catch (err) {
                console.error("[Dashboard] Exception inside loadProject:", err);
                alert("Failed to load project due to a runtime error.");
            }
        }

        document.getElementById('project-list').addEventListener('click', (e) => {
            const btn = e.target.closest('.open-3d-btn');
            if (btn) {
                e.preventDefault();
                const projectId = btn.getAttribute('data-id');
                if (projectId) {
                    loadProject(projectId);
                }
            }
        });

        loadDashboard();
    </script>
</body>

</html>
